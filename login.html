<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #f6f7fb;
      color: #111827;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,.07);
    }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .muted { color: #6b7280; font-size: 13px; margin: 0 0 14px; }
    label { display:block; font-size: 12px; color: #374151; margin: 10px 0 6px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      outline: none;
    }
    input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.15); }
    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      border: 0;
      border-radius: 10px;
      background: #4f46e5;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: .7; cursor: not-allowed; }
    .error {
      margin-top: 12px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #991b1b;
      padding: 10px 12px;
      border-radius: 10px;
      display:none;
      font-size: 13px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login erforderlich</h1>
    <p class="muted">Bitte einloggen, um die Website zu sehen und Musik hochzuladen.</p>

    <form id="loginForm">
      <label for="username">Benutzername</label>
      <input id="username" name="username" autocomplete="username" required />

      <label for="password">Passwort</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button id="submitBtn" type="submit">Einloggen</button>
      <div id="err" class="error"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const err = document.getElementById('err');
    const submitBtn = document.getElementById('submitBtn');

    function showError(message) {
      err.textContent = message;
      err.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.style.display = 'none';
      submitBtn.disabled = true;

      const username = (document.getElementById('username').value || '').trim();
      const password = document.getElementById('password').value || '';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showError(data && data.error ? data.error : 'Login fehlgeschlagen.');
          return;
        }

        window.location.href = '/';
      } catch (e2) {
        showError('Backend nicht erreichbar. Starte den Server mit: npm start');
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
