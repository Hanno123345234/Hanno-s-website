services:
  - type: web
    name: hanno-s-website
    env: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    disks:
      - name: clip-storage
        mountPath: /var/data
        sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: AI_PROVIDER
        value: github
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_MODEL
        value: microsoft/Phi-3.5-mini-instruct
      - key: GITHUB_MODELS_ENDPOINT
        value: https://models.inference.ai.azure.com/chat/completions
      - key: GITHUB_MODEL_FALLBACKS
        value: gpt-4o-mini,openai/gpt-4o-mini,gpt-4.1-mini,openai/gpt-4.1-mini,meta/Llama-3.2-3B-Instruct,microsoft/Phi-3.5-mini-instruct,microsoft/phi-3.5-mini-instruct
      - key: OPENAI_API_KEY
        sync: false
      - key: QUIZ_AI_MODEL
        value: gpt-4o-mini
      - key: ADMIN_OWNER_KEY
        sync: false
      - key: ADMIN_EDITOR_KEY
        sync: false
      - key: DISCORD_COMMANDS_BOT_KEY
        sync: false
      - key: DISCORD_COMMANDS_STORAGE
        value: github
      - key: DISCORD_COMMANDS_GITHUB_REPO
        value: Hanno123345234/Hanno-s-website
      - key: DISCORD_COMMANDS_GITHUB_PATH
        value: data/discord_commands.json
      - key: DISCORD_COMMANDS_GITHUB_BRANCH
        value: main
      - key: DISCORD_COMMANDS_GITHUB_TOKEN
        sync: false
      - key: DISCORD_COMMANDS_ALLOW_PUBLIC_READ
        value: "false"
      - key: BOT_DYNAMIC_COMMANDS_REFRESH_URL
        value: http://cybrancee-bot-eu-central-21.cybrancee.com:4173/internal/dynamic-commands/refresh
      - key: BOT_DYNAMIC_COMMANDS_REFRESH_KEY
        sync: false
      - key: SOCKET_IO_CORS_ORIGIN
        value: https://hanno-s-website.onrender.com,https://hanno123345234.github.io/Hanno-s-website
      - key: CLIPS_STORAGE_DIR
        value: /var/data/clips
      - key: CLIPS_RETENTION_DAYS
        value: "10"
      - key: CLIPS_MAX_SIZE_MB
        value: "200"
      - key: CLIPS_OWNER_SECRET
        sync: false
      - key: CLIPS_ACCESS_CODE
        value: Anna
      - key: GLOBAL_API_RATE_LIMIT_MAX
        value: "240"
      - key: CLIPS_PUBLIC_LOCKDOWN
        value: "true"

