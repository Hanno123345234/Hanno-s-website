<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Studio Hero">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#667eea"/>
      <stop offset="1" stop-color="#764ba2"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="35%" r="65%">
      <stop offset="0" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="800" rx="40" fill="url(#bg)"/>
  <rect width="1200" height="800" rx="40" fill="url(#glow)"/>

  <!-- Equalizer bars -->
  <g transform="translate(170,210)" fill="rgba(255,255,255,0.82)">
    <rect x="0" y="160" width="36" height="220" rx="16"/>
    <rect x="70" y="110" width="36" height="270" rx="16" opacity="0.95"/>
    <rect x="140" y="60" width="36" height="320" rx="16" opacity="0.85"/>
    <rect x="210" y="130" width="36" height="250" rx="16" opacity="0.9"/>
    <rect x="280" y="90" width="36" height="290" rx="16" opacity="0.88"/>
    <rect x="350" y="40" width="36" height="340" rx="16" opacity="0.8"/>
    <rect x="420" y="120" width="36" height="260" rx="16" opacity="0.9"/>
    <rect x="490" y="170" width="36" height="210" rx="16" opacity="0.86"/>
  </g>

  <!-- Soft knobs -->
  <g transform="translate(740,270)" fill="rgba(255,255,255,0.78)">
    <circle cx="0" cy="0" r="52"/>
    <circle cx="150" cy="10" r="40" opacity="0.9"/>
    <circle cx="280" cy="-10" r="46" opacity="0.86"/>
    <circle cx="70" cy="140" r="44" opacity="0.82"/>
    <circle cx="230" cy="150" r="54" opacity="0.8"/>
  </g>

  <!-- Wave line -->
  <path d="M90 640 C 190 590, 250 690, 360 640 S 560 590, 650 640 S 820 690, 930 640 S 1040 590, 1110 640" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="16" stroke-linecap="round"/>
</svg>
