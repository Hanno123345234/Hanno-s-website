<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1220" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card active">
        <div class="top-tools">
          <a href="./" class="mini-link">← Zur Auswahl</a>
          <button id="refreshAdminBtn" class="hidden">Neu laden</button>
        </div>

        <h1>Admin Dashboard</h1>
  <p class="admin-page-subtitle">Hannos KI steuern und Chat-Logs ansehen</p>
        <div id="adminLoginBox" class="admin-box">
          <p class="subtitle">Zugriff nur mit Admin-Key</p>
          <label for="adminKeyInput">Admin Access Key</label>
          <input id="adminKeyInput" type="password" placeholder="Admin-Key eingeben" autocomplete="off" />
          <div class="stack">
            <button id="adminLoginBtn">Einloggen</button>
            <button id="adminLogoutBtn" class="mini-btn" type="button">Logout</button>
          </div>
          <p id="adminInfo" class="subtitle"></p>
        </div>

        <div id="adminPanel" class="hidden">
          <div id="aiSection" class="admin-box">
            <h3>KI global steuern</h3>
            <p id="aiControlInfo" class="subtitle"></p>
            <div class="stack">
              <button id="disableAiBtn" class="kick-btn" type="button">KI fuer alle ausschalten</button>
              <button id="enableAiBtn" class="primary" type="button">KI fuer alle einschalten</button>
            </div>
          </div>

          <div class="player-list-wrap">
            <h3>KI Chat Logs</h3>
            <ul id="aiLogList" class="player-list"></ul>
          </div>
        </div>
      </section>
    </main>

    <script src="pwa.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
