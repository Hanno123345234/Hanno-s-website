<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1220" />
    <link rel="manifest" href="manifest.webmanifest" />
    <title>Admin</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="card active">
        <div class="top-tools">
          <a href="./" class="mini-link">← Zur Auswahl</a>
          <button id="refreshAdminBtn" class="hidden">Neu laden</button>
        </div>

        <h1>Admin Dashboard</h1>
  <p class="admin-page-subtitle">Hannos KI steuern und Chat-Logs ansehen</p>
        <div id="adminLoginBox" class="admin-box">
          <p class="subtitle">Zugriff nur mit Admin-Key</p>
          <label for="adminKeyInput">Admin Access Key</label>
          <input id="adminKeyInput" type="password" placeholder="Admin-Key eingeben" autocomplete="off" />
          <div class="stack">
            <button id="adminLoginBtn">Einloggen</button>
            <button id="adminLogoutBtn" class="mini-btn" type="button">Logout</button>
          </div>
          <p id="adminInfo" class="subtitle"></p>
        </div>

        <div id="adminPanel" class="hidden">
          <div id="aiSection" class="admin-box">
            <h3>KI global steuern</h3>
            <p id="aiControlInfo" class="subtitle"></p>
            <div class="stack">
              <button id="disableAiBtn" class="kick-btn" type="button">KI fuer alle ausschalten</button>
              <button id="enableAiBtn" class="primary" type="button">KI fuer alle einschalten</button>
            </div>
          </div>

          <div id="discordCommandsSection" class="admin-box">
            <h3>Discord Commands</h3>
            <p class="subtitle">Eigene Prefix-Commands erstellen und direkt im Bot verwenden.</p>

            <label for="cmdTriggerInput">Trigger (ohne Prefix, z. B. hello)</label>
            <input id="cmdTriggerInput" type="text" placeholder="hello" autocomplete="off" maxlength="32" />

            <label for="cmdModeSelect">Ausgabe</label>
            <select id="cmdModeSelect">
              <option value="text">Textnachricht</option>
              <option value="embed">Embed</option>
            </select>

            <label for="cmdEmbedTitleInput">Embed Titel (optional)</label>
            <input id="cmdEmbedTitleInput" type="text" placeholder="Info" autocomplete="off" maxlength="120" />

            <label for="cmdEmbedColorInput">Embed Farbe (Hex)</label>
            <input id="cmdEmbedColorInput" type="text" placeholder="#87CEFA" autocomplete="off" maxlength="7" />

            <label for="cmdResponseInput">Antwort</label>
            <textarea id="cmdResponseInput" rows="4" placeholder="Hallo {user}, willkommen auf {server}."></textarea>
            <p class="subtitle">Platzhalter: {user}, {username}, {server}, {channel}, {args}, {arg1} ... {arg5}</p>

            <label><input id="cmdEnabledInput" type="checkbox" checked /> Aktiv</label>

            <div class="stack">
              <button id="cmdSaveBtn" class="primary" type="button">Command speichern</button>
              <button id="cmdResetBtn" class="mini-btn" type="button">Formular leeren</button>
            </div>

            <ul id="discordCommandList" class="player-list"></ul>
          </div>

          <div class="player-list-wrap">
            <h3>KI Chat Logs</h3>
            <ul id="aiLogList" class="player-list"></ul>
          </div>
        </div>
      </section>
    </main>

    <script src="pwa.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
